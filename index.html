<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horário Escolar Premium</title>
    
    <meta name="theme-color" content="#4f46e5">
    
    <!-- Tailwind CSS Configurado para Dark Mode -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1', // Indigo
                            600: '#4f46e5',
                            900: '#312e81',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'blob': 'blob 7s infinite',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'bounce-in': 'bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        bounceIn: {
                            '0%': { opacity: '0', transform: 'scale(0.8)' },
                            '100%': { opacity: '1', transform: 'scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }

        body { font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; background-color: #f8fafc; }
        .dark body { background-color: #0f172a; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }

        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass-panel { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }

        /* Estilos específicos para impressão (Exportar PDF) */
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-table { width: 100%; border-collapse: collapse; }
            .print-table th, .print-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
            .print-table th { background-color: #f3f4f6; -webkit-print-color-adjust: exact; }
        }
    </style>

    <!-- 
      ==== ARQUIVO JSON EMBUTIDO ==== 
      Se for usar um arquivo externo, você pode apagar esta tag <script id="app-data"> 
      e descomentar a função fetch() lá embaixo no código React.
    -->
    
</head>
<body class="transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICONS SETUP ---
        const IconBase = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const BookOpen = (p) => <IconBase {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 1-4 4v14a3 3 0 0 1 3-3h7z"></path></IconBase>;
        const User = (p) => <IconBase {...p}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></IconBase>;
        const Clock = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></IconBase>;
        const Coffee = (p) => <IconBase {...p}><path d="M18 8h1a4 4 0 0 1 0 8h-1"></path><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path><line x1="6" y1="1" x2="6" y2="4"></line><line x1="10" y1="1" x2="10" y2="4"></line><line x1="14" y1="1" x2="14" y2="4"></line></IconBase>;
        const GraduationCap = (p) => <IconBase {...p}><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c3 3 9 3 12 0v-5"></path></IconBase>;
        const ChevronRight = (p) => <IconBase {...p}><path d="m9 18 6-6-6-6"/></IconBase>;
        const Moon = (p) => <IconBase {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconBase>;
        const Sun = (p) => <IconBase {...p}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></IconBase>;
        const Printer = (p) => <IconBase {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></IconBase>;
        const Settings = (p) => <IconBase {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconBase>;
        const Bell = (p) => <IconBase {...p}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></IconBase>;
        const Sparkles = (p) => <IconBase {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/></IconBase>;
        const XIcon = (p) => <IconBase {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>;
        const HelpCircle = (p) => <IconBase {...p}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></IconBase>;
        const MonitorSmartphone = (p) => <IconBase {...p}><path d="M18 8V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h8"/><path d="M10 19v-3.96 3.15"/><path d="M7 19h5"/><rect width="6" height="10" x="16" y="12" rx="2"/></IconBase>;

        // --- CORES INTELIGENTES ---
        const TAILWIND_COLORS = [
            "bg-blue-100 text-blue-800 border-blue-200 dark:bg-blue-900/40 dark:text-blue-300 dark:border-blue-800/50",
            "bg-emerald-100 text-emerald-800 border-emerald-200 dark:bg-emerald-900/40 dark:text-emerald-300 dark:border-emerald-800/50",
            "bg-purple-100 text-purple-800 border-purple-200 dark:bg-purple-900/40 dark:text-purple-300 dark:border-purple-800/50",
            "bg-pink-100 text-pink-800 border-pink-200 dark:bg-pink-900/40 dark:text-pink-300 dark:border-pink-800/50",
            "bg-indigo-100 text-indigo-800 border-indigo-200 dark:bg-indigo-900/40 dark:text-indigo-300 dark:border-indigo-800/50",
            "bg-rose-100 text-rose-800 border-rose-200 dark:bg-rose-900/40 dark:text-rose-300 dark:border-rose-800/50",
            "bg-teal-100 text-teal-800 border-teal-200 dark:bg-teal-900/40 dark:text-teal-300 dark:border-teal-800/50",
            "bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-900/40 dark:text-amber-300 dark:border-amber-800/50",
            "bg-cyan-100 text-cyan-800 border-cyan-200 dark:bg-cyan-900/40 dark:text-cyan-300 dark:border-cyan-800/50"
        ];

        const getSubjectColors = (subject) => {
            if (!subject || subject === 'Intervalo' || subject === '---') {
                return 'bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700';
            }
            const hash = subject.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            return TAILWIND_COLORS[hash % TAILWIND_COLORS.length];
        };

        // --- COMPONENTE: MODAL DE NOVIDADES ---
        function NewsModal({ isOpen, onClose, news }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 animate-fadeIn">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-lg relative z-10 overflow-hidden flex flex-col max-h-[85vh] animate-slide-up border border-slate-200 dark:border-slate-700">
                        <div className="bg-gradient-to-br from-brand-600 to-indigo-700 p-6 sm:p-8 text-white relative shrink-0">
                            <button onClick={onClose} className="absolute top-4 right-4 p-2 bg-white/20 hover:bg-white/30 rounded-full transition-colors backdrop-blur-md">
                                <XIcon className="w-5 h-5" />
                            </button>
                            <div className="bg-white/20 w-14 h-14 rounded-2xl flex items-center justify-center mb-4 backdrop-blur-md border border-white/20 shadow-inner">
                                <Sparkles className="w-7 h-7 text-white" />
                            </div>
                            <h2 className="text-2xl font-extrabold tracking-tight">Novidades do Portal</h2>
                            <p className="text-blue-100 text-sm mt-1 opacity-90">Fique por dentro das últimas atualizações do sistema.</p>
                        </div>
                        <div className="p-6 sm:p-8 overflow-y-auto space-y-6 custom-scrollbar bg-slate-50 dark:bg-slate-900">
                            {news.map((item) => (
                                <div key={item.id} className="relative pl-6 sm:pl-8 border-l-2 border-slate-200 dark:border-slate-700 pb-2">
                                    <div className="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-brand-500 border-4 border-slate-50 dark:border-slate-900"></div>
                                    <span className="text-xs font-bold text-brand-600 dark:text-brand-400 mb-1 block uppercase tracking-wider">{item.date}</span>
                                    <h3 className="text-lg font-bold text-slate-800 dark:text-white mb-2 leading-tight">{item.title}</h3>
                                    <p className="text-slate-600 dark:text-slate-400 text-sm leading-relaxed">{item.content}</p>
                                </div>
                            ))}
                            {news.length === 0 && <p className="text-slate-500 text-center py-4">Nenhuma novidade no momento.</p>}
                        </div>
                    </div>
                </div>
            );
        }

        // --- COMPONENTE: MODAL DE DICAS/AJUDA ---
        function HelpModal({ isOpen, onClose }) {
            if (!isOpen) return null;
            
            const tips = [
                { icon: <Clock className="w-5 h-5 text-orange-500"/>, title: "Aulas em Tempo Real", desc: "A aula que está acontecendo neste exato minuto ganha um destaque especial e pisca na sua tela." },
                { icon: <Sun className="w-5 h-5 text-yellow-500"/>, title: "Modo Escuro / Claro", desc: "Use o botão de lua/sol no topo direito para trocar as cores do aplicativo. Ótimo para leitura à noite!" },
                { icon: <Settings className="w-5 h-5 text-slate-500"/>, title: "Trocar de Turma", desc: "Clicando na engrenagem no menu superior, você volta para a tela inicial e pode escolher outra turma ou turno." },
                { icon: <MonitorSmartphone className="w-5 h-5 text-brand-500"/>, title: "Celular vs. PC", desc: "No celular, você navega pelos dias arrastando os botões no topo. No PC, você vê a grade da semana inteira de uma vez e pode imprimir ou salvar em PDF!" },
            ];

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 animate-fadeIn">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-white dark:bg-slate-900 rounded-3xl shadow-2xl w-full max-w-md relative z-10 overflow-hidden flex flex-col max-h-[85vh] animate-slide-up border border-slate-200 dark:border-slate-700">
                        
                        <div className="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-800/50">
                            <div className="flex items-center gap-3">
                                <div className="bg-brand-100 dark:bg-brand-900/50 p-2 rounded-xl text-brand-600 dark:text-brand-400">
                                    <HelpCircle className="w-6 h-6" />
                                </div>
                                <h2 className="text-xl font-bold text-slate-800 dark:text-white">Como usar o app</h2>
                            </div>
                            <button onClick={onClose} className="p-2 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 rounded-full transition-colors">
                                <XIcon className="w-5 h-5 text-slate-600 dark:text-slate-300" />
                            </button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto space-y-5 custom-scrollbar">
                            {tips.map((tip, index) => (
                                <div key={index} className="flex gap-4 items-start p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-700">
                                    <div className="mt-1 flex-shrink-0 bg-white dark:bg-slate-700 p-2 rounded-lg shadow-sm">
                                        {tip.icon}
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-slate-800 dark:text-slate-200 text-sm mb-1">{tip.title}</h3>
                                        <p className="text-xs text-slate-600 dark:text-slate-400 leading-relaxed">{tip.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="p-4 bg-slate-50 dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800">
                            <button onClick={onClose} className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl transition-colors">
                                Entendi!
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- COMPONENTE: TELA DE CONFIGURAÇÃO ---
        function SetupScreen({ data, onComplete }) {
            const [school, setSchool] = useState(data.schools[0].id);
            const [shift, setShift] = useState('tarde');
            const [classId, setClassId] = useState('');

            useEffect(() => {
                const classesForShift = data.classesByShift[shift] || [];
                const currentClassValid = classesForShift.find(c => c.id === classId);
                if (!currentClassValid) setClassId('');
            }, [shift, classId, data.classesByShift]);

            const handleSubmit = () => {
                if (school && shift && classId) onComplete({ school, shift, classId });
            };

            const availableClasses = data.classesByShift[shift] || [];

            return (
                <div className="min-h-screen p-6 flex flex-col justify-center items-center bg-gradient-to-br from-blue-50 to-indigo-100 dark:from-slate-900 dark:to-slate-800 relative overflow-hidden animate-fadeIn">
                    <div className="absolute top-[-10%] left-[-10%] w-64 h-64 bg-brand-400/30 dark:bg-brand-600/20 rounded-full mix-blend-multiply dark:mix-blend-lighten filter blur-3xl animate-blob"></div>
                    <div className="absolute bottom-[-10%] right-[-10%] w-72 h-72 bg-purple-400/30 dark:bg-purple-600/20 rounded-full mix-blend-multiply dark:mix-blend-lighten filter blur-3xl animate-blob" style={{animationDelay: '2s'}}></div>

                    <div className="w-full max-w-md relative z-10 glass-panel p-8 sm:p-10 rounded-[2rem] shadow-2xl animate-bounce-in">
                        <div className="text-center mb-8">
                            <div className="bg-gradient-to-br from-brand-500 to-indigo-600 w-20 h-20 rounded-[1.5rem] flex items-center justify-center mx-auto mb-5 shadow-lg shadow-brand-500/30 transform rotate-3 hover:rotate-0 transition-transform">
                                <GraduationCap className="w-10 h-10 text-white" />
                            </div>
                            <h1 className="text-3xl font-extrabold text-slate-800 dark:text-white tracking-tight">Bem-vindo(a)</h1>
                            <p className="text-slate-500 dark:text-slate-400 mt-2 font-medium">Configure seu portal escolar</p>
                        </div>

                        <div className="space-y-6">
                            <div>
                                <label className="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2">Escola</label>
                                <select 
                                    value={school} 
                                    onChange={(e) => setSchool(e.target.value)}
                                    className="w-full p-4 bg-white/50 dark:bg-slate-800/50 border border-white/40 dark:border-slate-700 rounded-2xl font-semibold text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500 appearance-none backdrop-blur-md transition-all shadow-sm"
                                >
                                    {data.schools.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2">Turno</label>
                                <div className="grid grid-cols-2 gap-3">
                                    {data.shifts.map(s => (
                                        <button
                                            key={s.id}
                                            onClick={() => setShift(s.id)}
                                            className={`p-4 rounded-2xl border font-bold transition-all duration-300 ${shift === s.id ? 'bg-brand-600 text-white border-brand-600 shadow-lg shadow-brand-500/30 transform scale-[1.03]' : 'bg-white/50 dark:bg-slate-800/50 text-slate-600 dark:text-slate-300 border-white/40 dark:border-slate-700 hover:bg-white dark:hover:bg-slate-800 backdrop-blur-md'}`}
                                        >
                                            {s.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className={`transition-all duration-300 ${!shift ? 'opacity-50 pointer-events-none' : ''}`}>
                                <label className="block text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2">Turma</label>
                                <select 
                                    value={classId} 
                                    onChange={(e) => setClassId(e.target.value)}
                                    className="w-full p-4 bg-white/50 dark:bg-slate-800/50 border border-white/40 dark:border-slate-700 rounded-2xl font-semibold text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500 appearance-none backdrop-blur-md transition-all shadow-sm"
                                >
                                    <option value="" disabled>{availableClasses.length === 0 ? 'Sem turmas' : 'Selecione sua turma'}</option>
                                    {availableClasses.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                </select>
                            </div>

                            <button 
                                onClick={handleSubmit}
                                disabled={!school || !shift || !classId}
                                className="w-full mt-2 bg-gradient-to-r from-brand-600 to-indigo-600 text-white py-4.5 rounded-2xl font-extrabold shadow-xl shadow-brand-500/30 hover:shadow-brand-500/50 hover:-translate-y-1 disabled:opacity-50 disabled:shadow-none disabled:transform-none transition-all flex items-center justify-center gap-2 h-14"
                            >
                                Acessar Horários
                                <ChevronRight className="w-5 h-5" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- APP PRINCIPAL ---
        function App() {
            const [data, setData] = useState(null);
            const [preferences, setPreferences] = useState(null);
            const [activeDay, setActiveDay] = useState('segunda');
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [currentTime, setCurrentTime] = useState(new Date());
            
            // Estados para Modais
            const [newsData, setNewsData] = useState([]);
            const [hasUnreadNews, setHasUnreadNews] = useState(false);
            const [isNewsModalOpen, setIsNewsModalOpen] = useState(false);
            const [isHelpModalOpen, setIsHelpModalOpen] = useState(false); // Novo Modal de Ajuda

            // 1. Carrega os Dados
            useEffect(() => {
                // --- COMO USAR O ARQUIVO EXTERNO (EXEMPLO) ---
                 fetch('dados.json')
                    .then(response => response.json())
                    .then(parsed => {
                        setData(parsed);
                        processNews(parsed.news || []);
                    })
                    .catch(e => console.error("Erro ao carregar JSON externo:", e));
                
                
                // --- Lógica Atual (Lendo da tag <script> no HTML) ---
                /*try {
                    const jsonElement = document.getElementById('app-data');
                    if(jsonElement) {
                        const parsed = JSON.parse(jsonElement.textContent);
                        setData(parsed);
                        processNews(parsed.news || []);
                    }
                } catch (e) {
                    console.error("Erro ao ler JSON embutido:", e);
                }
                    */
            }, []);

            // Função separada para processar novidades
            const processNews = (loadedNews) => {
                setNewsData(loadedNews);
                const lastSeenId = localStorage.getItem('schoolApp_lastSeenNewsId');
                if (loadedNews.length > 0) {
                    if (String(loadedNews[0].id) !== lastSeenId) {
                        setHasUnreadNews(true);
                    }
                }
            };

            // 2. Configurações salvas e Tema
            useEffect(() => {
                const saved = localStorage.getItem('schoolAppPrefs_v4');
                if (saved) setPreferences(JSON.parse(saved));
                
                const themePref = localStorage.getItem('schoolAppTheme');
                if (themePref === 'dark') setIsDarkMode(true);

                const dayMap = { 1: 'segunda', 2: 'terca', 3: 'quarta', 4: 'quinta', 5: 'sexta' };
                const today = dayMap[new Date().getDay()] || 'segunda';
                setActiveDay(today);
            }, []);

            // 3. Aplica Dark Mode
            useEffect(() => {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('schoolAppTheme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('schoolAppTheme', 'light');
                }
            }, [isDarkMode]);

            // 4. Relógio em tempo real
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 60000); 
                return () => clearInterval(timer);
            }, []);

            const savePreferences = (prefs) => {
                localStorage.setItem('schoolAppPrefs_v4', JSON.stringify(prefs));
                setPreferences(prefs);
            };

            const handleOpenNews = () => {
                setIsNewsModalOpen(true);
                setHasUnreadNews(false);
                if (newsData.length > 0) {
                    localStorage.setItem('schoolApp_lastSeenNewsId', String(newsData[0].id));
                }
            };

            const isCurrentClass = (timeString, dayKey) => {
                const currentDayMap = { 1: 'segunda', 2: 'terca', 3: 'quarta', 4: 'quinta', 5: 'sexta' };
                if (currentDayMap[currentTime.getDay()] !== dayKey) return false;
                
                if (!timeString) return false;
                const [start, end] = timeString.split(' - ');
                if (!start || !end) return false;

                const parseTime = (str) => {
                    const [h, m] = str.split(':').map(Number);
                    return h * 60 + m;
                };

                const nowMinutes = currentTime.getHours() * 60 + currentTime.getMinutes();
                return nowMinutes >= parseTime(start) && nowMinutes <= parseTime(end);
            };

            if (!data) return <div className="p-10 text-center dark:text-white flex h-screen items-center justify-center font-bold">Carregando dados...</div>;
            if (!preferences) return <SetupScreen data={data} onComplete={savePreferences} />;

            const currentTimes = data.timeSlots[preferences.shift] || {};
            const classSchedule = data.schedule[preferences.shift]?.[preferences.classId] || {}; 
            const daySchedule = classSchedule[activeDay] || [];
            
            const days = [
                { key: 'segunda', label: 'Segunda' }, { key: 'terca', label: 'Terça' },
                { key: 'quarta', label: 'Quarta' }, { key: 'quinta', label: 'Quinta' },
                { key: 'sexta', label: 'Sexta' }
            ];

            const timeKeys = ['T1', 'T2', 'T3', 'INT', 'T4', 'T5'];

            return (
                <div className="min-h-screen flex flex-col font-sans select-none pb-10 relative">
                    
                    {/* CABEÇALHO PREMIUM */}
                    <header className="no-print bg-gradient-to-br from-brand-600 to-indigo-800 text-white p-5 sm:p-8 shadow-2xl rounded-b-[2rem] sm:rounded-b-[2.5rem] mb-4 sm:mb-8 relative overflow-hidden shrink-0 z-20">
                        {/* Efeitos de Fundo no Header */}
                        <div className="absolute top-[-20%] right-[-10%] w-64 h-64 bg-white/10 rounded-full mix-blend-overlay filter blur-3xl"></div>
                        <div className="absolute bottom-[-20%] left-[-10%] w-64 h-64 bg-indigo-400/20 rounded-full mix-blend-overlay filter blur-2xl"></div>

                        <div className="max-w-6xl mx-auto relative z-10 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 sm:gap-6">
                            <div>
                                <p className="text-brand-100 text-[10px] sm:text-xs font-bold tracking-widest mb-1 uppercase opacity-90 drop-shadow-sm">Portal do Aluno</p>
                                <h1 className="text-2xl sm:text-4xl font-extrabold flex items-center gap-3 drop-shadow-md tracking-tight">
                                    <div className="bg-white/20 p-2 rounded-xl backdrop-blur-sm border border-white/10 hidden sm:block">
                                        <GraduationCap className="w-8 h-8 sm:w-10 sm:h-10 text-white" />
                                    </div>
                                    <span>Turma {preferences.classId}</span>
                                </h1>
                                <div className="flex items-center gap-2 mt-2 sm:mt-4">
                                    <span className="bg-white/10 backdrop-blur-md px-3 py-1 sm:px-3.5 sm:py-1.5 rounded-full text-[10px] sm:text-xs font-bold border border-white/20 uppercase tracking-wider shadow-inner">
                                        Turno {preferences.shift}
                                    </span>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-1 sm:gap-3 bg-white/5 p-1 rounded-2xl backdrop-blur-sm border border-white/10 self-end sm:self-auto">
                                <button onClick={() => window.print()} className="hidden md:flex items-center gap-2 px-4 py-2 hover:bg-white/10 rounded-xl transition text-sm font-bold" aria-label="Imprimir">
                                    <Printer className="w-4 h-4" /> Exportar
                                </button>
                                
                                <button onClick={() => setIsHelpModalOpen(true)} className="p-2.5 sm:p-3 hover:bg-white/10 rounded-xl transition" aria-label="Ajuda">
                                    <HelpCircle className="w-5 h-5 text-brand-50" />
                                </button>
                                
                                <button onClick={handleOpenNews} className="relative p-2.5 sm:p-3 hover:bg-white/10 rounded-xl transition group" aria-label="Novidades">
                                    <Bell className="w-5 h-5 text-brand-50 group-hover:text-white transition-colors" />
                                    {hasUnreadNews && (
                                        <span className="absolute top-2 right-2 w-2.5 h-2.5 bg-red-500 border-2 border-brand-700 rounded-full animate-pulse"></span>
                                    )}
                                </button>

                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 sm:p-3 hover:bg-white/10 rounded-xl transition" aria-label="Mudar Tema">
                                    {isDarkMode ? <Sun className="w-5 h-5 text-yellow-300" /> : <Moon className="w-5 h-5 text-brand-50" />}
                                </button>
                                
                                <button onClick={() => setPreferences(null)} className="p-2.5 sm:p-3 hover:bg-white/10 rounded-xl transition" aria-label="Alterar Turma">
                                    <Settings className="w-5 h-5 text-brand-50" />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 w-full flex-1">
                        
                        {/* =========================================
                            VISÃO MOBILE (Celular) - Oculto no PC
                        ========================================= */}
                        <div className="md:hidden no-print relative">
                            
                            {/* Abas de Dias - Agora FIXAS no topo ao rolar (Sticky) */}
                            <div className="sticky top-0 z-40 bg-[#f8fafc] dark:bg-[#0f172a] pt-2 pb-4 -mx-4 px-4 transition-colors">
                                <div className="flex overflow-x-auto gap-2 no-scrollbar px-1 py-1">
                                    {days.map((day) => (
                                        <button
                                            key={day.key}
                                            onClick={() => setActiveDay(day.key)}
                                            className={`flex-shrink-0 px-5 py-2.5 rounded-2xl font-bold text-sm transition-all duration-300 whitespace-nowrap shadow-sm border
                                                ${activeDay === day.key 
                                                    ? 'bg-brand-600 text-white border-brand-600 shadow-brand-500/40 dark:shadow-brand-900/50 shadow-lg scale-[1.02]' 
                                                    : 'bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700'
                                                }`}
                                        >
                                            {day.label}
                                        </button>
                                    ))}
                                </div>
                                {/* Sombra sutil para indicar rolagem abaixo do header sticky */}
                                <div className="absolute bottom-0 left-0 right-0 h-4 bg-gradient-to-b from-[#f8fafc] dark:from-[#0f172a] to-transparent pointer-events-none translate-y-full"></div>
                            </div>

                            {daySchedule.length === 0 ? (
                                <div className="text-center py-20 bg-white dark:bg-slate-800 rounded-[2rem] border border-dashed border-slate-300 dark:border-slate-700 shadow-sm mx-1 mt-6">
                                    <div className="bg-slate-50 dark:bg-slate-700 w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-5 border border-slate-100 dark:border-slate-600 shadow-inner transform rotate-3">
                                        <Coffee className="w-10 h-10 text-slate-300 dark:text-slate-500" />
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-700 dark:text-slate-200">Dia Livre</h3>
                                    <p className="text-slate-400 dark:text-slate-500 mt-2 text-sm">Nenhuma aula cadastrada para hoje.</p>
                                </div>
                            ) : (
                                /* NOVO LAYOUT TIMELINE (LINHA DO TEMPO) PARA MOBILE */
                                <div className="relative border-l-2 border-slate-200 dark:border-slate-700 ml-4 mt-6 mb-8 space-y-6">
                                    {daySchedule.map((item, index) => {
                                        const isInterval = item.tc === 'INT';
                                        const timeSlot = currentTimes[item.tc] || "";
                                        const isActive = isCurrentClass(timeSlot, activeDay);
                                        const colorClasses = getSubjectColors(item.sub);

                                        if (isInterval) {
                                            return (
                                                <div key={index} className="relative pl-6 opacity-80">
                                                    {/* Ponto na timeline */}
                                                    <div className={`absolute w-3 h-3 rounded-full -left-[7px] top-3 border-2 border-[#f8fafc] dark:border-[#0f172a] bg-slate-300 dark:bg-slate-600`}></div>
                                                    
                                                    <div className={`inline-flex items-center gap-2 text-xs font-bold uppercase tracking-widest px-4 py-2 rounded-xl border transition-colors shadow-sm
                                                        ${isActive ? 'bg-orange-100 text-orange-700 border-orange-300 dark:bg-orange-900/60 dark:text-orange-300 animate-pulse-slow' : 'bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700'}`}>
                                                        <Coffee className="w-4 h-4" />
                                                        Intervalo • {timeSlot.split(' - ')[0]}
                                                    </div>
                                                </div>
                                            );
                                        }

                                        return (
                                            <div key={index} className="relative pl-6">
                                                {/* Ponto na timeline */}
                                                <div className={`absolute w-4 h-4 rounded-full -left-[9px] top-4 border-4 border-[#f8fafc] dark:border-[#0f172a] shadow-sm transition-colors duration-300
                                                    ${isActive ? 'bg-brand-500 animate-pulse' : 'bg-slate-300 dark:bg-slate-600'}`}>
                                                </div>

                                                <div className={`p-4 rounded-[1.25rem] border bg-white dark:bg-slate-800 shadow-sm transition-all duration-300 overflow-hidden border-slate-100 dark:border-slate-700 
                                                    ${isActive ? 'ring-2 ring-brand-500 scale-[1.02] shadow-xl shadow-brand-500/20 dark:shadow-brand-900/40 z-10' : ''}`}>
                                                    
                                                    {isActive && (
                                                        <div className="absolute top-0 right-0 bg-gradient-to-l from-brand-500 to-brand-400 text-white text-[9px] font-bold px-2 py-1 rounded-bl-lg uppercase tracking-wider shadow-sm">
                                                            Agora
                                                        </div>
                                                    )}
                                                    
                                                    <div className="flex justify-between items-start">
                                                        <div className="flex-1 pr-2">
                                                            <div className={`inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold mb-2.5 tracking-wide border shadow-sm ${colorClasses}`}>
                                                                {item.sub}
                                                            </div>
                                                            <div className="flex items-center text-slate-600 dark:text-slate-300 text-xs bg-slate-50 dark:bg-slate-900/50 w-fit px-2 py-1 rounded-md border border-slate-100 dark:border-slate-700/50">
                                                                <User className="w-3.5 h-3.5 mr-1.5 text-slate-400 dark:text-slate-500" />
                                                                <span className="font-semibold truncate max-w-[130px]">{item.tea}</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col items-end justify-center pt-1">
                                                            <div className="flex items-center text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1">
                                                                <Clock className="w-3 h-3 mr-1" /> Horário
                                                            </div>
                                                            <div className="text-xs font-extrabold text-slate-700 dark:text-slate-200 bg-slate-100 dark:bg-slate-700/80 px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 shadow-inner text-center leading-tight">
                                                                {timeSlot.replace(' - ', '\n')}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>

                        {/* =========================================
                            VISÃO DESKTOP (PC / Impressão) - Oculto no Mobile
                        ========================================= */}
                        <div className="hidden md:block print-only bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-200 dark:border-slate-700 animate-slide-up relative overflow-hidden">
                            
                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-brand-400 to-transparent opacity-50"></div>

                            <div className="mb-8 flex justify-between items-end">
                                <div>
                                    <h2 className="text-3xl font-extrabold text-slate-800 dark:text-white tracking-tight">Grade Semanal</h2>
                                    <p className="text-slate-500 dark:text-slate-400 font-medium mt-1">Visão completa • Turma {preferences.classId} • Turno {preferences.shift === 'manha' ? 'Manhã' : 'Tarde'}</p>
                                </div>
                            </div>

                            <div className="overflow-x-auto rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm">
                                <table className="w-full text-left print-table">
                                    <thead className="bg-slate-50 dark:bg-slate-900/80">
                                        <tr>
                                            <th className="p-5 border-b dark:border-slate-700 font-bold text-slate-400 uppercase text-[11px] tracking-widest text-center w-36">Horário</th>
                                            {days.map(d => (
                                                <th key={d.key} className="p-5 border-b border-l border-slate-200 dark:border-slate-700 font-extrabold text-slate-700 dark:text-slate-200 text-center w-1/5">{d.label}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50">
                                        {timeKeys.map((tk, idx) => {
                                            const timeString = currentTimes[tk] || "";
                                            const isBreakRow = tk === 'INT';

                                            return (
                                                <tr key={idx} className="hover:bg-slate-50/80 dark:hover:bg-slate-800/80 transition-colors group">
                                                    <td className="p-4 align-middle text-center font-bold text-xs text-slate-500 dark:text-slate-400 bg-slate-50/50 dark:bg-slate-900/30">
                                                        <div className="flex flex-col items-center justify-center gap-1">
                                                            <Clock className="w-4 h-4 opacity-50" />
                                                            {timeString.replace(' - ', '\n')}
                                                        </div>
                                                    </td>
                                                    
                                                    {isBreakRow ? (
                                                        <td colSpan={5} className="p-3 text-center bg-slate-50/50 dark:bg-slate-900/30 border-l border-slate-100 dark:border-slate-700/50">
                                                            <div className="inline-flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 px-6 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-sm">
                                                                <Coffee className="w-4 h-4" /> Intervalo
                                                            </div>
                                                        </td>
                                                    ) : (
                                                        days.map(d => {
                                                            const cellClass = classSchedule[d.key]?.find(c => c.tc === tk);
                                                            const isActive = isCurrentClass(timeString, d.key);
                                                            
                                                            if (!cellClass) return <td key={d.key} className="p-4 text-center text-slate-300 dark:text-slate-600 border-l border-slate-100 dark:border-slate-700/50">-</td>;
                                                            
                                                            const colorClass = getSubjectColors(cellClass.sub);

                                                            return (
                                                                <td key={d.key} className="p-2 align-top h-28 border-l border-slate-100 dark:border-slate-700/50">
                                                                    <div className={`h-full rounded-[1rem] p-4 border flex flex-col justify-center items-center text-center transition-all duration-300 ${colorClass} ${isActive ? 'ring-2 ring-brand-500 shadow-lg shadow-brand-500/20 scale-[1.02] relative z-10 animate-pulse-slow' : 'group-hover:scale-[1.02] shadow-sm'}`}>
                                                                        <span className="font-extrabold text-sm mb-1.5 leading-tight">{cellClass.sub}</span>
                                                                        <span className="text-[11px] opacity-80 font-semibold bg-white/40 dark:bg-slate-900/40 px-2 py-1 rounded-md w-full truncate">{cellClass.tea}</span>
                                                                    </div>
                                                                </td>
                                                            );
                                                        })
                                                    )}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {/* Modais */}
                    <NewsModal 
                        isOpen={isNewsModalOpen}
                        onClose={() => setIsNewsModalOpen(false)}
                        news={newsData}
                    />
                    
                    <HelpModal 
                        isOpen={isHelpModalOpen}
                        onClose={() => setIsHelpModalOpen(false)}
                    />

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
